name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Build Next.js
        run: npm run build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: 'Auto Public v__VERSION__'
          releaseBody: |
            電子書籍自動生成 & KDPアップロード デスクトップアプリ

            ## ダウンロード
            - **Mac (Apple Silicon)**: `.dmg` ファイル (aarch64)
            - **Mac (Intel)**: `.dmg` ファイル (x86_64)
            - **Windows**: `.msi` または `.exe` ファイル

            ## 初回セットアップ
            1. アプリをインストール
            2. `.env` ファイルに `ANTHROPIC_API_KEY` を設定
            3. KDPアップロードを使う場合は `KDP_EMAIL` と `KDP_PASSWORD` も設定
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
